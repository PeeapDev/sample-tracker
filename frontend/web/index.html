<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="National Sample Collection & Real-Time Monitoring System - Sierra Leone">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NSRTMS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>NSRTMS - Sample Tracking System</title>
  <!-- mobile_scanner uses ZXing to read barcodes in the browser (camera scan on
       phones). Required for the camera-mode scanner on the web build. Vendored
       locally (instead of a CDN) so the field PWA stays self-contained. -->
  <script src="zxing.min.js" type="application/javascript"></script>
  <!-- Web Push helper: Dart calls window.nsrtmsSubscribePush(vapidKey) to
       subscribe this device; the service worker (flutter_service_worker.js,
       with appended push handlers) shows notifications when the app is closed. -->
  <script src="push.js" type="application/javascript"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/flutter_service_worker.js')
          .then(function(registration) {
            console.log('ServiceWorker registered');
          })
          .catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
