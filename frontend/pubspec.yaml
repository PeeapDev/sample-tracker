  path_provider: ^2.1.2
  path: ^1.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.2
  package_info_plus: ^9.0.1
  mobile_scanner: ^4.0.1
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  drift_dev: ^2.16.0

flutter:
