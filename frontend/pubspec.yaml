name: nsrtms_frontend
description: National Sample Collection & Real-Time Monitoring System - PWA Frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2
  json_annotation: ^4.8.1
  drift: ^2.16.0
